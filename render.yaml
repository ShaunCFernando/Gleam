databases:
  - name: seoulshelf-db
    plan: free
    databaseName: seoulshelf
    user: seoulshelf

services:
  - type: web
    name: seoulshelf-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: seoulshelf-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
